global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/slack-webhook-url

# ─── Templates de notification ────────────────────────────────────────────────
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# ─── Routage des alertes ──────────────────────────────────────────────────────
route:
  receiver: 'slack-devops'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Alertes critiques → canal urgent + PagerDuty
    - matchers:
        - severity = "critical"
      receiver: 'slack-critical-pagerduty'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Alertes warning → canal devops standard
    - matchers:
        - severity = "warning"
      receiver: 'slack-devops'
      group_wait: 1m

# ─── Inhibitions ──────────────────────────────────────────────────────────────
inhibit_rules:
  # Si l'alerte critique est déjà active, inhiber le warning
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'cluster', 'service']

# ─── Receivers ────────────────────────────────────────────────────────────────
receivers:
  - name: 'slack-devops'
    slack_configs:
      - channel: '#devops-alerts'
        username: 'Alertmanager'
        icon_emoji: ':bell:'
        send_resolved: true
        title: '{{ template "slack.shopflow.title" . }}'
        text: '{{ template "slack.shopflow.text" . }}'
        color: '{{ template "slack.shopflow.color" . }}'
        actions:
          - type: button
            text: 'Voir Grafana'
            url: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
          - type: button
            text: 'Runbook'
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'

  - name: 'slack-critical-pagerduty'
    slack_configs:
      - channel: '#devops-critique'
        username: 'Alertmanager CRITIQUE'
        icon_emoji: ':rotating_light:'
        send_resolved: true
        title: '🚨 CRITIQUE: {{ template "slack.shopflow.title" . }}'
        text: '{{ template "slack.shopflow.text" . }}'
    pagerduty_configs:
      - routing_key_file: /etc/alertmanager/secrets/pagerduty-key
        description: '{{ template "pagerduty.shopflow.description" . }}'
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
