name: CI — Intégration Continue

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/shopflow-api

jobs:
  # ─── Job 1 : Qualité du code ──────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installation des dépendances
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

      - name: Tests unitaires avec couverture
        run: npm test -- --coverage

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Job 2 : Sécurité statique ────────────────────────────────────────────────
  security-scan:
    name: SAST & Dépendances
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Audit des dépendances npm
        run: npm audit --audit-level=high

      - name: Scan SAST avec Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/nodejs

  # ─── Job 3 : Build & Scan image Docker ───────────────────────────────────────
  build-and-scan:
    name: Build Docker & Scan Trivy
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan]

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build image Docker (sans push)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Charger l'image
        run: docker load --input /tmp/image.tar

      - name: Scan Trivy — vulnérabilités critiques (bloquant)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL"

      - name: Scan Trivy — rapport complet (non bloquant)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload résultats Trivy vers GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # ─── Job 4 : Push image (uniquement sur main) ────────────────────────────────
  push-image:
    name: Push Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build et Push image de production
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du build
        run: |
          echo "## Image Docker publiée ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Tag SHA :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry :** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
