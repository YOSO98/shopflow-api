---
# ─── NetworkPolicy : isolation réseau ShopFlow prod ──────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shopflow-api-netpol
  namespace: shopflow-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: shopflow-api

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Autoriser le trafic depuis Ingress NGINX uniquement
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

    # Autoriser le scraping Prometheus
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # Autoriser la résolution DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Autoriser la connexion à RDS PostgreSQL
    - to:
        - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - protocol: TCP
          port: 5432

    # Autoriser HTTPS sortant (API externes)
    - ports:
        - protocol: TCP
          port: 443
