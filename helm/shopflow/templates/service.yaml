apiVersion: v1
kind: Service
metadata:
  name: {{ include "shopflow.fullname" . }}
  labels:
    {{- include "shopflow.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "3000"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "shopflow.selectorLabels" . | nindent 4 }}
